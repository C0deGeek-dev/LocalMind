name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pull the tagged version's section out of CHANGELOG.md for the notes.
      - name: extract release notes
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '$0 ~ "^## v" v "( |$)"{f=1;next} f&&/^## /{exit} f{print}' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
